<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат — MentorConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header"></header>

<div class="chat-layout">
  <!-- Chat list -->
  <div class="chat-list" id="chatList">
    <div style="padding:14px 16px;font-weight:600;border-bottom:1px solid #e0e0e0;font-size:.95rem">Диалоги</div>
    <div id="chatListItems"><div class="loader"><div class="spinner"></div></div></div>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">
    <div id="chatHeader" style="padding:14px 18px;background:#fff;border-bottom:1px solid #e0e0e0;font-weight:600;display:flex;align-items:center;gap:10px">
      <span id="chatHeaderName">Выберите диалог</span>
      <span id="chatOnline" style="display:none;font-size:.75rem;color:var(--success);font-weight:400">● онлайн</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state"><div class="icon">💬</div><p>Выберите чат слева</p></div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typingName">печатает...</span>
    </div>
    <div class="chat-input-area" id="chatInputArea" style="display:none">
      <textarea id="msgInput" placeholder="Введите сообщение..." onkeydown="handleKey(event)" oninput="onTyping()"></textarea>
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script src="../js/notifSocket.js"></script>
<script src="../js/socketClient.js"></script>
<script src="../js/chat-ui.js"></script>
</body>
</html>
