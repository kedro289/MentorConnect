<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль ментора — MentorConnect</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .profile-hero { background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:28px; display:flex; gap:24px; align-items:flex-start; margin-bottom:20px; }
    .profile-avatar { width:100px; height:100px; border-radius:50%; background:#fff3eb; display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:var(--primary); font-weight:700; flex-shrink:0; }
    .profile-meta h1 { margin:0 0 8px; font-size:1.5rem; }
    .profile-meta .meta-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:10px; }
    .meta-item { display:flex; align-items:center; gap:6px; font-size:.9rem; color:#444; }
    .tabs { display:flex; gap:0; border-bottom:2px solid #e0e0e0; margin-bottom:20px; }
    .tab { padding:10px 22px; cursor:pointer; font-size:.95rem; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
    .tab.active { border-bottom-color:var(--primary); color:var(--primary); font-weight:600; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .offer-card { background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:18px; margin-bottom:14px; }
    .offer-card h4 { margin:0 0 6px; }
    .review-item { border-bottom:1px solid #e0e0e0; padding:14px 0; }
    .review-item:last-child { border-bottom:none; }
  </style>
</head>
<body>

<header class="site-header"></header>

<main class="main-content" style="max-width:880px">
  <div id="profileContent"><div class="loader"><div class="spinner"></div></div></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script src="../js/notifSocket.js"></script>
<script src="../js/rating-widget.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const mentorId = params.get('id');
  const currentUser = getUser();
  const token = getToken();

  async function loadMentorProfile() {
    if (!mentorId) {
      document.getElementById('profileContent').innerHTML = '<p>Ментор не указан</p>';
      return;
    }
    try {
      const [profileData, reviewsData, offersData] = await Promise.all([
        getMentorCard(mentorId),
        getMentorReviews(mentorId),
        getMentorOffers(mentorId),
      ]);
      const p = profileData.profile;
      const reviews = reviewsData.reviews;
      const offers  = offersData.offers;

      document.title = `${p.full_name || 'Ментор'} — MentorConnect`;

      document.getElementById('profileContent').innerHTML = `
        <div class="profile-hero">
          <div class="profile-avatar">
            ${p.avatar_url ? `<img src="${p.avatar_url}" style="width:100px;height:100px;border-radius:50%;object-fit:cover">` : (p.full_name||'М').charAt(0)}
          </div>
          <div class="profile-meta">
            <h1>${p.full_name || 'Имя не указано'}</h1>
            <div class="meta-row">
              <div class="meta-item"><span class="stars">${starsHtml(p.avg_rating||0)}</span> ${(+p.avg_rating||0).toFixed(1)} (${p.total_reviews||0} отзывов)</div>
              ${p.experience_years ? `<div class="meta-item">🕐 ${p.experience_years} лет опыта</div>` : ''}
              <div class="meta-item">💰 ${p.price_type==='free'?'Бесплатно':`${p.price_amount} ₽/час`}</div>
              ${(+p.avg_rating||0)>=4.5&&(+p.total_reviews||0)>=3?'<div class="meta-item"><span class="verified-badge">✓ Проверенный ментор</span></div>':''}
            </div>
            <div class="mentor-expertise">${(p.expertise||[]).map(e=>`<span class="tag">${e}</span>`).join('')}</div>
            ${p.available_schedule ? `<div class="meta-item" style="margin-top:8px">📅 ${p.available_schedule}</div>` : ''}
            <div id="actionButtons" style="margin-top:16px"></div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" onclick="showTab('about',this)">О менторе</div>
          <div class="tab" onclick="showTab('offers',this)">Предложения (${offers.length})</div>
          <div class="tab" onclick="showTab('reviews',this)">Отзывы (${reviews.length})</div>
        </div>

        <div id="tab-about" class="tab-content active">
          <div class="content-section">
            <h3>Биография</h3>
            <p>${p.bio || 'Биография не указана'}</p>
            ${p.experience_text ? `<h3>Опыт работы</h3><p>${p.experience_text}</p>` : ''}
            ${(p.portfolio_links||[]).length ? `<h3>Портфолио</h3><ul>${p.portfolio_links.map(l=>`<li><a href="${l}" target="_blank">${l}</a></li>`).join('')}</ul>` : ''}
          </div>
          <div id="ratingWidget"></div>
        </div>

        <div id="tab-offers" class="tab-content">
          ${offers.length ? offers.map(o=>`
            <div class="offer-card">
              <h4>${o.title}</h4>
              <p style="color:#444;margin:6px 0">${o.description||''}</p>
              <div style="display:flex;gap:12px;font-size:.87rem;color:#767676">
                ${o.category?`<span>📂 ${o.category}</span>`:''}
                <span>💰 ${o.price_type==='free'?'Бесплатно':o.price_amount+' ₽'}</span>
              </div>
            </div>`).join('') : '<p style="color:#767676">Нет предложений</p>'}
        </div>

        <div id="tab-reviews" class="tab-content">
          <div id="reviewsContainer">
            ${reviews.length ? reviews.map(r=>`
              <div class="review-item">
                <div style="display:flex;justify-content:space-between">
                  <strong>${r.student_name||r.student_email}</strong>
                  <span class="stars">${starsHtml(r.rating)}</span>
                </div>
                <p style="margin:6px 0;color:#444">${r.comment||''}</p>
                <small style="color:#767676">${formatDate(r.created_at)}</small>
              </div>`).join('') : '<p style="color:#767676">Нет отзывов</p>'}
          </div>
          <div id="reviewFormContainer"></div>
        </div>
      `;

      renderActionButtons(p);
      loadRatingWidget(mentorId);
    } catch (e) {
      document.getElementById('profileContent').innerHTML = '<div class="empty-state"><p>Ментор не найден</p></div>';
    }
  }

  async function renderActionButtons(p) {
    const el = document.getElementById('actionButtons');
    if (!token || !currentUser) {
      el.innerHTML = `<a href="login.html" class="btn-primary" style="width:auto;padding:10px 24px;display:inline-block;text-decoration:none">Войти, чтобы написать</a>`;
      return;
    }
    if (currentUser.role !== 'student') return;

    el.innerHTML = `<button class="btn-primary" style="width:auto;padding:10px 24px" onclick="sendApplication()">✉️ Написать ментору</button>
      <button id="favBtn" style="width:auto;padding:10px 18px;margin-left:10px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.95rem" onclick="toggleFav()">🤍 В избранное</button>
      <div id="appMsg" style="margin-top:8px;font-size:.87rem"></div>`;
  initFavBtn();

    // Проверить — есть ли принятая заявка (для формы отзыва)
    try {
      const apps = await apiRequest('GET', '/applications/my');
      const accepted = apps.applications.find(a => a.mentor_id == mentorId && a.status === 'accepted');
      if (accepted) {
        document.getElementById('reviewFormContainer').innerHTML = `
          <div class="content-section" style="margin-top:20px">
            <h3>Оставить отзыв</h3>
            <div id="reviewAlert" style="display:none"></div>
            <div class="form-group"><label>Оценка</label>
              <select id="reviewRating">
                <option value="5">★★★★★ Отлично</option>
                <option value="4">★★★★☆ Хорошо</option>
                <option value="3">★★★☆☆ Нормально</option>
                <option value="2">★★☆☆☆ Плохо</option>
                <option value="1">★☆☆☆☆ Ужасно</option>
              </select>
            </div>
            <div class="form-group"><label>Комментарий</label><textarea id="reviewComment" rows="3"></textarea></div>
            <button class="btn-primary" style="width:auto;padding:9px 24px" onclick="submitReview()">Отправить отзыв</button>
          </div>`;
      }
    } catch {}
  }

  let _isFav = false;
  async function initFavBtn() {
    try {
      const data = await apiRequest('GET', '/favorites');
      _isFav = (data.favorites || []).some(f => f.mentor_id == mentorId);
      const btn = document.getElementById('favBtn');
      if (btn) {
        btn.textContent = _isFav ? '❤️ В избранном' : '🤍 В избранное';
        if (_isFav) { btn.style.borderColor='#e53935'; btn.style.color='#e53935'; }
      }
    } catch { /* ignore */ }
  }

  async function toggleFav() {
    const btn = document.getElementById('favBtn');
    try {
      if (_isFav) {
        await apiRequest('DELETE', `/favorites/${mentorId}`);
        _isFav = false;
        btn.textContent = '🤍 В избранное';
        btn.style.borderColor = 'var(--border)';
        btn.style.color = 'inherit';
      } else {
        await apiRequest('POST', '/favorites', { mentorId: parseInt(mentorId) });
        _isFav = true;
        btn.textContent = '❤️ В избранном';
        btn.style.borderColor = '#e53935';
        btn.style.color = '#e53935';
      }
    } catch (e) { alert(e.message || 'Ошибка'); }
  }

  async function sendApplication() {
    const msg = document.getElementById('appMsg');
    try {
      await apiRequest('POST', '/applications', { mentorId: parseInt(mentorId), message: 'Хочу учиться у вас' });
      msg.style.color = 'green';
      msg.textContent = '✅ Заявка отправлена';
    } catch (e) {
      msg.style.color = '#c0392b';
      msg.textContent = e.message || 'Ошибка';
    }
  }

  async function submitReview() {
    const alert = document.getElementById('reviewAlert');
    alert.style.display = 'none';
    try {
      await apiRequest('POST', '/reviews', {
        mentorId: parseInt(mentorId),
        rating: parseInt(document.getElementById('reviewRating').value),
        comment: document.getElementById('reviewComment').value,
      });
      alert.className = 'alert alert-success';
      alert.textContent = '✅ Отзыв отправлен';
      alert.style.display = 'block';
    } catch (e) {
      alert.className = 'alert alert-error';
      alert.textContent = e.message || 'Ошибка';
      alert.style.display = 'block';
    }
  }

  function showTab(name, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (el) el.classList.add('active');
  }

  loadMentorProfile();
</script>
</body>
</html>
